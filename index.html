<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trust Global Bank</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
      // Initialize Pi SDK
      // Sandbox should be false when running in the Pi Browser for production
      const isPiBrowser = /PiBrowser/i.test(navigator.userAgent);
      if (window.Pi) {
        window.Pi.init({ 
          version: "2.0", 
          sandbox: !isPiBrowser 
        });
      } else {
        console.warn("Pi SDK not loaded yet, will retry in App.tsx");
      }
      // Store App ID for reference
      window.PI_APP_ID = ""; // Enter your Pi App ID here (e.g., "tgb6734")
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
